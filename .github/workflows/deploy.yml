name: Deploy 360 Feedback Form

on:
  push:
    branches: [main]
  workflow_dispatch:  # also allows manual trigger from Actions tab

permissions:
  contents: write  # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate hash path from webhook URL
        id: hash
        run: |
          # SHA256 hash of the webhook URL → first 16 chars as the path segment
          # Unguessable, but stable — same secret always produces same URL
          HASH=$(echo -n "${{ secrets.PA_WEBHOOK_URL }}" | sha256sum | cut -c1-16)
          echo "path=$HASH" >> $GITHUB_OUTPUT
          echo "Deploying to path: $HASH"

      - name: Inject webhook URL into HTML template
        env:
          PA_WEBHOOK_URL: ${{ secrets.PA_WEBHOOK_URL }}
        run: |
          python3 -c "
import os
with open('src/form-template.html') as f:
    content = f.read()
content = content.replace('__WEBHOOK_URL__', os.environ['PA_WEBHOOK_URL'])
with open('/tmp/index.html', 'w') as f:
    f.write(content)
"

      - name: Prepare dist folder
        run: |
          mkdir -p dist/${{ steps.hash.outputs.path }}
          cp /tmp/index.html dist/${{ steps.hash.outputs.path }}/index.html
          cp src/404.html dist/404.html

          # Also write a root index that prints nothing useful (no hints)
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta name="robots" content="noindex, nofollow">
            <title>Not found</title>
          </head>
          <body></body>
          </html>
          EOF

      - name: Print live URL
        run: |
          FORM_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ steps.hash.outputs.path }}/"
          SHARE_URL="${FORM_URL}?colleagues=Name1,Name2,Name3"

          # Write to job summary — visible at the top of the Actions run page
          echo "## 360° Feedback — Live URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Form URL**" >> $GITHUB_STEP_SUMMARY
          echo "\`${FORM_URL}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Share link example**" >> $GITHUB_STEP_SUMMARY
          echo "\`${SHARE_URL}\`" >> $GITHUB_STEP_SUMMARY

          # Also keep console output
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Live form URL: ${FORM_URL}"
          echo "Share as: ${SHARE_URL}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false   # preserve history
          keep_files: true      # don't wipe old hashed paths on redeploy
