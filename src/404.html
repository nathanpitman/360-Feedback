<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link not found — 360° Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #FAFAF8;
  --surface:  #FFFFFF;
  --border:   #E8E5E0;
  --ink:      #1C1917;
  --ink2:     #78716C;
  --ink3:     #A8A29E;
  --accent:   #4F46E5;
  --accent-l: #EEF2FF;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  max-width: 480px;
  width: calc(100% - 32px);
  text-align: center;
}

.icon {
  font-size: 40px;
  margin-bottom: 20px;
}

h1 {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 12px;
}

p {
  color: var(--ink2);
  line-height: 1.6;
  font-size: 14px;
}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🔗</div>
    <h1>This link isn't valid</h1>
    <p>If you've been sent a 360&deg; feedback form, please ask the sender to share the link again — it may have changed or been entered incorrectly.</p>
  </div>
</body>
</html>
